name: CI

on:
    pull_request:
        branches: [main]
    push:
        branches: [main, 4.x]

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
    contents: read

jobs:
    lint-and-unit:
        name: Lint & unit (Node ${{ matrix.node }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node: ['22', '24', '26']
        steps:
            - uses: actions/checkout@v4

            - name: Enable corepack
              run: corepack enable

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm build

            - name: Lint
              run: pnpm lint

            - name: Typecheck
              run: pnpm typecheck

            - name: Unit tests
              run: pnpm test:unit

            - name: Upload core coverage
              if: matrix.node == '22'
              uses: actions/upload-artifact@v4
              with:
                  name: core-coverage
                  path: packages/core/coverage/
                  if-no-files-found: ignore

    integration:
        name: Integration (Docker, Node 22)
        runs-on: ubuntu-latest
        needs: lint-and-unit
        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Run integration tests
              run: docker compose up --build --abort-on-container-exit --attach rsscloud-tests --no-log-prefix

            - name: Upload xunit results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: server-xunit
                  path: xunit/test-results.xml
                  if-no-files-found: warn
