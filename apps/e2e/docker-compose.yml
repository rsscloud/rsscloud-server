services:

  rsscloud:
    build:
      context: ../..
      dockerfile: apps/server/Dockerfile
    environment:
      DOMAIN: rsscloud
      PORT: 5337
      NODE_TLS_REJECT_UNAUTHORIZED: 0
      ENABLE_TEST_API: "true"
    expose:
      - 5337

  rsscloud-tests:
    build:
      context: ../..
      dockerfile: apps/e2e/Dockerfile
    command: dockerize -wait http://rsscloud:5337 -timeout 10s bash -c "pnpm run e2e-test"
    environment:
      APP_URL: http://rsscloud:5337
      MOCK_SERVER_DOMAIN: rsscloud-tests
      MOCK_SERVER_PORT: 8002
      SECURE_MOCK_SERVER_PORT: 8003
    volumes:
      - ./xunit:/app/apps/e2e/xunit
    expose:
      - 8002
      - 8003
    depends_on:
      - rsscloud
